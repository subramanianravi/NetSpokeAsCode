---
- name: Look up DLP profile ID
  uri:
    url: "https://{{ netskope_tenant }}/api/v2/policy/dlpprofiles?name={{ dlp_profile | urlencode }}"
    method: GET
    headers:
      Netskope-Api-Token: "{{ netskope_api_token }}"
    status_code: 200
  register: dlp_lookup
  when: dlp_profile | length > 0

- name: Create URL security policy
  uri:
    url: "https://{{ netskope_tenant }}/api/v2/policy/urllist"
    method: POST
    headers:
      Netskope-Api-Token: "{{ netskope_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name:    "{{ policy_name }}"
      action:  "{{ policy_action }}"
      enabled: true
      source:
        users: "{{ source_users }}"
      destination:
        domains: "{{ destination_domains }}"
      dlp_profile_id: "{{ dlp_lookup.json.data[0].id | default(omit) }}"
    status_code: [200, 201]
  register: policy

- name: Show policy ID
  debug:
    msg: "Policy ID: {{ policy.json.id }}"
